
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Q-Less Scramble - A word placement puzzle game">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234ecca3' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>Q</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234ecca3' width='192' height='192' rx='40'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>Q</text></svg>">
    <title>Q-Less Scramble</title>
    <style>
        :root { --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; --text: #ffffff; --danger: #e94560; }
        body { font-family: sans-serif; background: #000; color: var(--text); margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        /* Desktop phone frame styling */
        @media (min-width: 800px) {
            #phone-frame {
                width: 375px;
                height: 812px;
                background: #000;
                border-radius: 40px;
                border: 12px solid #1a1a1a;
                box-shadow: 0 20px 60px rgba(0,0,0,0.8);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                position: relative;
            }
            #phone-frame::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 28px;
                background: #000;
                border-radius: 0 0 20px 20px;
                z-index: 10;
            }
            body { background: #222; }
        }
        @media (max-width: 799px) {
            #phone-frame {
                width: 100%;
                height: 100%;
            }
        }
        #app-container { width: 100%; height: 100%; display: flex; flex-direction: column; flex: 1; }
        .tab-bar { display: flex; background: #0f3460; height: 38px; }
        .tab { flex: 1; line-height: 38px; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.8rem; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom: 2px solid var(--accent); background: var(--panel); }
        .content { flex: 1; display: none; flex-direction: column; align-items: center; padding: 4px; overflow-y: auto; }
        .content.active { display: flex; }
        #seed-info { background: var(--panel); padding: 5px; border-radius: 5px; text-align: center; margin: 3px; width: 90%; border: 1px solid var(--accent); font-size: 0.75rem; }
        .seed-input-container { width: 90%; display: flex; gap: 4px; margin-bottom: 5px; }
        #custom-seed-input { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #34495e; background: #0f3460; color: white; font-size: 0.8rem; }
        #timer { font-family: monospace; font-size: 1.5rem; color: #f1c40f; margin: 2px 0; }
        #dice-bank { display: flex; gap: 3px; min-height: 42px; padding: 5px; background: var(--panel); border: 1px dashed var(--accent); border-radius: 6px; width: 94%; flex-wrap: wrap; justify-content: center; }
        .die { width: 34px; height: 34px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1a1a2e; touch-action: none; position: relative; z-index: 10; font-size: 1rem; box-shadow: 0 2px 0 #bdc3c7; }
        .die-val { position: absolute; bottom: 0px; right: 1px; font-size: 0.45rem; color: #666; }
        #grid { display: grid; grid-template-columns: repeat(10, 33px); grid-template-rows: repeat(9, 33px); gap: 1px; background: #0f3460; padding: 3px; border-radius: 4px; margin-top: 3px; }
        .cell { width: 33px; height: 33px; background: var(--bg); border: 1px solid #16213e; display: flex; align-items: center; justify-content: center; }
        .btn { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 2px; width: 90%; font-size: 0.8rem; }
        .btn-main { background: var(--accent); color: white; }
        .btn-blue { background: #3498db; color: white; }
        .mini-btn { padding: 3px 6px; font-size: 0.6rem; background: var(--panel); color: white; border: 1px solid #34495e; border-radius: 3px; }
        .history-item { background: var(--panel); padding: 8px; margin: 3px 0; border-radius: 4px; border-left: 3px solid var(--accent); display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        .history-item span { flex: 1; font-weight: bold; color: var(--accent); }
        .history-limit { font-size: 0.65rem; color: #f1c40f; margin-top: 3px; text-align: center; }
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: var(--panel); width: 90%; max-width: 350px; max-height: 70vh; padding: 12px; border-radius: 10px; overflow-y: auto; }
        .drag-hint { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #666; display: none; }
        @media (min-width: 800px) {
            .drag-hint { display: block; }
        }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; cursor: pointer; user-select: none; }
        #splash-screen.hidden { animation: fadeOut 0.5s ease-out forwards; pointer-events: none; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .splash-content { text-align: center; color: white; }
        .splash-title { font-size: 3rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .splash-subtitle { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }
        .splash-icon { font-size: 6rem; margin-bottom: 20px; }
        .splash-hint { font-size: 0.9rem; color: #999; margin-top: 40px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="phone-frame">
        <div id="splash-screen" onclick="closeSplash()">
            <div class="splash-content">
                <div class="splash-icon">🎮</div>
                <div class="splash-title">Q-Less Scramble</div>
                <div class="splash-subtitle">Word Placement Puzzle</div>
                <div class="splash-hint">Tap to start</div>
            </div>
        </div>
        <div id="app-container">
            <div class="tab-bar"><div class="tab active" id="tab-setup" onclick="showTab('setup')">MENU</div><div class="tab" id="tab-play" onclick="showTab('play')">PLAY</div></div>
    <div id="setup" class="content active">
        <div id="seed-info"><strong>Seed:</strong> <span id="display-seed">...</span></div>
        <div class="seed-input-container"><input type="text" id="custom-seed-input" placeholder="Seed word..."><button class="mini-btn" onclick="startCustomSeed()">GO</button></div>
        <button class="btn btn-main" onclick="startDaily()">Daily Challenge</button><button class="btn btn-blue" onclick="startRandomSeed()">Random Seed</button>
        <div id="history-container" style="width:95%; margin-top:5px;"></div>
    </div>
    <div id="play" class="content">
        <div id="timer">00:00</div>
        <div style="display:flex; justify-content: space-between; width: 95%; margin-bottom: 3px;">
            <div><button class="mini-btn" onclick="clearGrid()">RESET</button><button class="mini-btn" onclick="centerGrid()" style="margin-left:3px">CENTER</button></div>
            <div><button class="mini-btn" onclick="shuffleBank()">SHUFFLE</button><button class="mini-btn" onclick="saveCurrentGame()" style="color:var(--accent)">SAVE</button></div>
        </div>
        <div id="dice-bank"></div><div id="grid"></div><button class="btn btn-blue" style="margin-top:8px;" onclick="validateBoard()">CHECK WORDS</button>
    </div>
            <div id="modal-overlay"><div class="modal-content"><h3 style="color:var(--accent); text-align:center; margin-top:0;">Results</h3><div id="modal-list-container"></div><h4 id="total-score" style="text-align:center; color:#f1c40f;"></h4><button class="btn btn-main" style="width:100%" onclick="closeModal()">CLOSE</button></div></div>
        </div>
    </div>
    <div class="drag-hint">💻 Drag tiles with mouse</div>
    <script>
        // ==================== GAME STATE ====================
        let seconds = 0, timerInterval, isPaused = true, currentSeed = "", currentLetters = [];
        const MAX_HISTORY = 10;  // Maximum saved games to keep
        
        // Point values for each letter (Scrabble scoring)
        const pts = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
        
        // Vowel and consonant distributions for random selection
        const vW = "AAAAAAAAAEEEEEEEEEEEEIIIIIIIII OOOOOOOO UUUU", cW = "BBCCDDDDFFGGGHHJKLLLLMMNNNNNNPPPP RRRRRRSSSSTTTTTTVVWWXYYZ";
        // ==================== RANDOM NUMBER GENERATION ====================
        // Mulberry32 PRNG - deterministic based on seed
        function mulberry32(a) { 
            return function() { 
                var t = a += 0x6D2B79F5; 
                t = Math.imul(t ^ t >>> 15, t | 1); 
                t ^= t + Math.imul(t ^ t >>> 7, t | 61); 
                return ((t ^ t >>> 14) >>> 0) / 4294967296; 
            } 
        }
        
        // Cyrb128 hash function - converts string seed to numeric seed
        function cyrb128(str) { 
            let h1 = 1779033703, h2 = 3144134277; 
            for (let i = 0, k; i < str.length; i++) { 
                k = str.charCodeAt(i); 
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067); 
                h2 = h1 ^ Math.imul(h2 ^ k, 2869860233); 
            } 
            return [h1>>>0, h2>>>0]; 
        }
        // ==================== UI NAVIGATION ====================
        // Close splash screen and start the game
        function closeSplash() {
            const splash = document.getElementById('splash-screen');
            splash.classList.add('hidden');
            setTimeout(() => {
                splash.style.display = 'none';
                // Start timer after splash closes
                if (!isPaused) {
                    isPaused = false;
                    timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
                }
            }, 500);
        }
        
        // Switch between setup menu and play screen
        function showTab(t) { 
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            document.getElementById('tab-' + t).classList.add('active'); 
            if (t === 'setup') { 
                isPaused = true; 
                clearInterval(timerInterval); 
                updateHistoryUI(); 
            } else { 
                // Don't start timer immediately - let splash screen handle it
                isPaused = false;
                const splash = document.getElementById('splash-screen');
                if (splash.style.display !== 'none') {
                    // Splash screen is visible, timer will start when splash closes
                    return;
                }
                // Splash already closed, start timer now
                timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000); 
            } 
        }
        // ==================== GAME INITIALIZATION ====================
        // Roll letters based on seed (deterministic random)
        function rollWithSeed(s) { 
            currentSeed = s.toUpperCase(); 
            const rand = mulberry32(cyrb128(currentSeed)[0]); 
            document.getElementById('display-seed').textContent = currentSeed; 
            seconds = 0; 
            currentLetters = []; 
            const vw = vW.replace(/ /g,''), cw = cW.replace(/ /g,''); 
            // 3 vowels
            for(let i=0; i<3; i++) currentLetters.push(vw[Math.floor(rand() * vw.length)]); 
            // 9 consonants
            for(let i=0; i<9; i++) currentLetters.push(cw[Math.floor(rand() * cw.length)]); 
            initNewGame(); 
        }
        // Clear grid and render dice, then show play tab
        function initNewGame() { 
            document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; delete c.dataset.letter; }); 
            renderDice(); 
            showTab('play'); 
        }
        
        // Render dice in the bank with letter and point value
        function renderDice() { 
            const b = document.getElementById('dice-bank'); 
            b.innerHTML = ''; 
            currentLetters.forEach((l, i) => { 
                const d = document.createElement('div'); 
                d.className = 'die'; 
                d.innerHTML = `${l}<span class="die-val">${pts[l]}</span>`; 
                d.id = 'die-' + i; 
                d.dataset.letter = l; 
                addTouchEvents(d); 
                b.appendChild(d); 
            }); 
        }
        // ==================== GRID MANIPULATION ====================
        // Return all dice from grid to bank
        function clearGrid() { 
            const b = document.getElementById('dice-bank'); 
            document.querySelectorAll('.cell .die').forEach(d => { 
                b.appendChild(d); 
                delete d.parentElement.dataset.letter; 
            }); 
        }
        // Center the placed letters in the grid
        function centerGrid() { 
            let p = []; 
            document.querySelectorAll('.cell').forEach(c => { 
                if (c.firstChild) p.push({ 
                    r: parseInt(c.id.split('-')[1]), 
                    c: parseInt(c.id.split('-')[2]), 
                    el: c.firstChild, 
                    l: c.dataset.letter 
                }); 
            });
            if (!p.length) return; 
            // Find bounds of placed letters
            let minR = Math.min(...p.map(x=>x.r)), maxR = Math.max(...p.map(x=>x.r));
            let minC = Math.min(...p.map(x=>x.c)), maxC = Math.max(...p.map(x=>x.c));
            // Calculate offset to center the piece
            let offR = Math.floor((8-(maxR-minR))/2)-minR; 
            let offC = Math.floor((9-(maxC-minC))/2)-minC;
            // Clear grid and reposition all pieces
            document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; delete c.dataset.letter; });
            p.forEach(x => { 
                let nc = document.getElementById(`c-${x.r+offR}-${x.c+offC}`); 
                if (nc) { 
                    nc.appendChild(x.el); 
                    nc.dataset.letter = x.l; 
                } 
            });
        }
        // Shuffle the dice in the bank
        function shuffleBank() { 
            const b = document.getElementById('dice-bank'); 
            for (let i = b.children.length; i >= 0; i--) b.appendChild(b.children[Math.random() * i | 0]); 
        }
        // ==================== WORD VALIDATION ====================
        // Check board for valid words (horizontal and vertical)
        async function validateBoard() {
            let found = new Set();
            // Check horizontal words (rows)
            for (let r = 0; r < 9; r++) { 
                let w = ""; 
                for (let c = 0; c < 10; c++) { 
                    const cell = document.getElementById(`c-${r}-${c}`);
                    const l = cell ? cell.dataset.letter : null; 
                    if (l) { 
                        w += l; 
                    } else { 
                        // Only add word if it has 2+ letters and is all uppercase letters
                        if (w.length > 1 && /^[A-Z]+$/.test(w)) found.add(w); 
                        w = ""; 
                    } 
                } 
                if (w.length > 1 && /^[A-Z]+$/.test(w)) found.add(w); 
            }
            // Check vertical words (columns)
            for (let c = 0; c < 10; c++) { 
                let w = ""; 
                for (let r = 0; r < 9; r++) { 
                    const cell = document.getElementById(`c-${r}-${c}`);
                    const l = cell ? cell.dataset.letter : null; 
                    if (l) { 
                        w += l; 
                    } else { 
                        // Only add word if it has 2+ letters and is all uppercase letters
                        if (w.length > 1 && /^[A-Z]+$/.test(w)) found.add(w); 
                        w = ""; 
                    } 
                } 
                if (w.length > 1 && /^[A-Z]+$/.test(w)) found.add(w); 
            }
            
            const sorted = Array.from(found).sort(); 
            let total = 0, html = "<ol style='padding-left:15px; color:white;'>";
            for (let word of sorted) { 
                // Verify the word still has valid letters (length check and letter validation)
                if (!word || word.length < 2 || !/^[A-Z]+$/.test(word)) continue;
                
                const ok = await checkWord(word); 
                let s = 0; 
                if (ok) { 
                    word.split('').forEach(l => s += pts[l]); 
                    total += s; 
                } 
                html += `<li style="${ok?'':'text-decoration:line-through; color:var(--danger)'}\">${word} (${s} pts)</li>`; 
            }
            document.getElementById('modal-list-container').innerHTML = html + "</ol>"; 
            document.getElementById('total-score').textContent = "TOTAL: " + total; 
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        // Validate word against online dictionary API with error handling
        async function checkWord(w) { 
            if (w.length < 3) return false; 
            try { 
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`, { timeout: 5000 }); 
                return response && response.ok; 
            } catch (error) { 
                console.warn(`Error checking word "${w}":`, error); 
                return false; 
            } 
        }
        // Close validation results modal
        function closeModal() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
        }
        // ==================== TOUCH & DRAG ====================
        // Add touch and mouse events for dragging dice to grid (supports both mobile and desktop)
        function addTouchEvents(el) {
            let ox, oy, isDragging = false; 
            
            // Touch events for mobile
            el.ontouchstart = (e) => { 
                const t = e.touches[0]; 
                ox = t.clientX - el.getBoundingClientRect().left; 
                oy = t.clientY - el.getBoundingClientRect().top; 
                el.style.position = 'fixed'; 
                el.style.zIndex = 1000; 
            };
            el.ontouchmove = (e) => { 
                const t = e.touches[0]; 
                el.style.left = (t.clientX - ox) + 'px'; 
                el.style.top = (t.clientY - oy) + 'px'; 
            };
            el.ontouchend = (e) => {
                el.style.position = 'relative'; 
                el.style.left = '0'; 
                el.style.top = '0'; 
                el.style.zIndex = 10; 
                const t = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                if (t && (t.classList.contains('cell') || t.id === 'dice-bank') && (t.innerHTML === "" || t.id === 'dice-bank')) { 
                    if (el.parentElement.classList.contains('cell')) delete el.parentElement.dataset.letter;
                    t.appendChild(el); 
                    if (t.classList.contains('cell')) t.dataset.letter = el.dataset.letter; 
                }
            };
            
            // Mouse events for desktop
            el.onmousedown = (e) => {
                const rect = el.getBoundingClientRect();
                el._dragOffsetX = e.clientX - rect.left; 
                el._dragOffsetY = e.clientY - rect.top; 
                el.style.position = 'fixed'; 
                el.style.zIndex = 1000; 
                el._dragging = true;
                e.preventDefault();
            };
        }
        
        // Document-level mouse tracking for dragging
        document.addEventListener('mousemove', (e) => {
            const draggingEl = document.querySelector('.die[style*="position: fixed"]');
            if (draggingEl && draggingEl._dragging) {
                draggingEl.style.left = (e.clientX - draggingEl._dragOffsetX) + 'px';
                draggingEl.style.top = (e.clientY - draggingEl._dragOffsetY) + 'px';
            }
        });
        
        // Document-level mouse up for dropping
        document.addEventListener('mouseup', (e) => {
            const draggingEl = document.querySelector('.die[style*="position: fixed"]');
            if (draggingEl && draggingEl._dragging) {
                draggingEl._dragging = false;
                draggingEl.style.position = 'relative'; 
                draggingEl.style.left = '0'; 
                draggingEl.style.top = '0'; 
                draggingEl.style.zIndex = 10; 
                const targetEl = document.elementFromPoint(e.clientX, e.clientY);
                if (targetEl && (targetEl.classList.contains('cell') || targetEl.id === 'dice-bank') && (targetEl.innerHTML === "" || targetEl.id === 'dice-bank')) { 
                    if (draggingEl.parentElement.classList.contains('cell')) delete draggingEl.parentElement.dataset.letter;
                    targetEl.appendChild(draggingEl); 
                    if (targetEl.classList.contains('cell')) targetEl.dataset.letter = draggingEl.dataset.letter; 
                }
            }
        });
        // ==================== GAME SAVE/LOAD ====================
        // Save current game state to local storage
        function saveCurrentGame() {
            // Capture board state
            const b = []; 
            document.querySelectorAll('.cell').forEach(c => { 
                if(c.firstChild) b.push({
                    cid: c.id, 
                    l: c.dataset.letter, 
                    did: c.firstChild.id
                }); 
            });
            // Capture bank state
            const bk = []; 
            document.getElementById('dice-bank').querySelectorAll('.die').forEach(d => bk.push({
                l: d.dataset.letter, 
                did: d.id
            }));
            // Create save object
            const s = {
                seed: currentSeed, 
                time: seconds, 
                board: b, 
                bank: bk, 
                date: new Date().toLocaleTimeString()
            };
            // Store in history (max 10 saves)
            let h = JSON.parse(localStorage.getItem('qless_scrab_hist') || '[]'); 
            h.unshift(s); 
            if(h.length > MAX_HISTORY) h.pop();
            localStorage.setItem('qless_scrab_hist', JSON.stringify(h)); 
            alert("Game saved!");
        }
        // Update UI with saved games from history
        function updateHistoryUI() { 
            const h = JSON.parse(localStorage.getItem('qless_scrab_hist') || '[]'); 
            const hasHistory = h.length > 0;
            document.getElementById('history-container').innerHTML = 
                (hasHistory ? '<strong style="font-size:0.8rem; color:var(--accent); margin-bottom:3px; display:block;">Recent Games:</strong>' : '<div style="text-align:center; color:#666; padding:10px;">No saved games yet</div>') +
                h.map((s, i) => `<div class="history-item"><span>${s.seed} (${s.date})</span><button class="mini-btn" onclick="loadGame(${i})">LOAD</button></div>`).join('') +
                (h.length > 0 ? `<div class="history-limit">Showing ${h.length}/${MAX_HISTORY} saved games</div>` : '');
        }
        // Load a previously saved game
        function loadGame(idx) {
            const s = JSON.parse(localStorage.getItem('qless_scrab_hist'))[idx]; 
            currentSeed = s.seed; 
            seconds = s.time; 
            document.getElementById('display-seed').textContent = s.seed;
            // Clear current board
            document.querySelectorAll('.cell').forEach(c => { c.innerHTML = ''; delete c.dataset.letter; }); 
            document.getElementById('dice-bank').innerHTML = '';
            // Restore board pieces
            s.board.forEach(i => { 
                const d = document.createElement('div'); 
                d.className = 'die'; 
                d.innerHTML = `${i.l}<span class="die-val">${pts[i.l]}</span>`; 
                d.id = i.did; 
                d.dataset.letter = i.l; 
                addTouchEvents(d); 
                let c = document.getElementById(i.cid); 
                c.appendChild(d); 
                c.dataset.letter = i.l; 
            });
            // Restore bank pieces
            s.bank.forEach(i => { 
                const d = document.createElement('div'); 
                d.className = 'die'; 
                d.innerHTML = `${i.l}<span class="die-val">${pts[i.l]}</span>`; 
                d.id = i.did; 
                d.dataset.letter = i.l; 
                addTouchEvents(d); 
                document.getElementById('dice-bank').appendChild(d); 
            });
            showTab('play');
        }
        // ==================== TIMER ====================
        // Update timer display (mm:ss format)
        function updateTimer() { 
            const m = Math.floor(seconds/60).toString().padStart(2,'0'); 
            const s = (seconds%60).toString().padStart(2,'0'); 
            document.getElementById('timer').textContent = `${m}:${s}`; 
        }
        // ==================== GAME START FUNCTIONS ====================
        // Start daily challenge with same seed for all players on same day
        function startDaily() { 
            rollWithSeed("DAILY-" + new Date().toISOString().slice(0, 10)); 
        }
        
        // Start game with random seed from predefined list
        function startRandomSeed() { 
            rollWithSeed(["PIVOT", "JAGUAR", "QUARTZ", "WIZARD", "GALAXY", "BREEZE", "CHROME"][Math.floor(Math.random()*7)]); 
        }
        
        // Start game with custom seed from user input
        function startCustomSeed() { 
            let v = document.getElementById('custom-seed-input').value.trim(); 
            if(v.length < 3) {
                alert("Seed must be at least 3 characters");
                return;
            }
            rollWithSeed(v);
            document.getElementById('custom-seed-input').value = ''; 
        }
        // ==================== INITIALIZATION ====================
        // Build 9x10 grid
        const grid = document.getElementById('grid'); 
        for (let r = 0; r < 9; r++) { 
            for (let c = 0; c < 10; c++) { 
                const cell = document.createElement('div'); 
                cell.className = 'cell'; 
                cell.id = `c-${r}-${c}`; 
                grid.appendChild(cell); 
            } 
        }
        
        // Start with daily seed
        startDaily();
    </script>
    <script>
        // Register Service Worker for offline support and PWA installation
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').then(
                registration => {
                    console.log('Service Worker registered successfully:', registration);
                },
                error => {
                    console.log('Service Worker registration failed:', error);
                }
            );
        }
    </script>
</body>
</html>
